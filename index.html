function rankHtml(rows,key,formatter){
  const max=Math.max(...rows.map(r=>n(r[key])),1);return rows.slice(0,10).map((r,i)=>'<div class="rank-row"><span class="rank-no">'+(i+1)+'</span><span title="'+escapeHtml(r.label)+'">'+escapeHtml(r.label).slice(0,18)+'</span><span class="bar-track"><span class="bar-fill" style="width:'+(n(r[key])/max*100).toFixed(1)+'%"></span></span><span class="rank-value">'+formatter(r[key])+'</span></div>').join('')||'<div class="empty">暂无数据</div>'
}

function renderDiagnosis(root){

  ads.forEach(r=>{if(r.spend>=300&&r.roi<.8)issues.push({date:r.date,type:'低投产',level:'danger',detail:(r.account||r.sheet)+' · 消费 '+money(r.spend)+' · ROI '+roi(r.roi),metric:r.roi});if(r.compensation<0)issues.push({date:r.date,type:'赔付冲减',level:'warn',detail:(r.account||r.sheet)+' · '+money(r.compensation),metric:r.compensation})});
  issues.sort((a,b)=>b.date.localeCompare(a.date));

function renderActiveModule(){
  $$('.module').forEach(el=>el.classList.toggle('active',el.dataset.module===state.module));
  $$('.nav button').forEach(el=>el.classList.toggle('active',el.dataset.module===state.module));
  const root=$('.module.active');state.search='';
  if(state.module==='overview')renderOverview(root);else if(state.module==='product-lines')renderProductLines(root);
  else if(state.module==='deal-channels')renderDealChannels(root);else if(state.module==='content-types')renderContentTypes(root);else renderExcellentNotes(root);
}
$('#startDate').value=state.start;$('#endDate').value=state.end;
$$('.nav button').forEach(btn=>btn.addEventListener('click',()=>{state.module=btn.dataset.module;const t=titles[state.module];$('#pageTitle').textContent=t[0];$('#pageSub').textContent=t[1];$('#sidebar').classList.remove('open');renderActiveModule()}));
$('#startDate').addEventListener('change',e=>{state.start=e.target.value;renderActiveModule()});
$('#endDate').addEventListener('change',e=>{state.end=e.target.value;renderActiveModule()});
$('#productFilter').addEventListener('change',e=>{state.product=e.target.value;resetDependentFilters();renderActiveModule()});
$('#channelFilter').addEventListener('change',e=>{state.channel=e.target.value;renderActiveModule()});
$('#mobileMenu').addEventListener('click',()=>$('#sidebar').classList.toggle('open'));
let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(renderActiveModule,180)});
renderActiveModule();
</script>
</body>
</html>
